<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" fill="#121f41"/>
  
  <!-- K in Red -->
  <g transform="translate(128, 128)">
    <!-- K Letter - Red (#FF0000) -->
    <g fill="#FF0000">
      <!-- K vertical stem -->
      <rect x="-45" y="-70" width="22" height="140" rx="8"/>
      <!-- K top diagonal -->
      <path d="M -23 -50 L 50 -10 L 30 10 L -23 -30 Z"/>
      <!-- K bottom diagonal -->
      <path d="M -23 30 L 50 70 L 30 90 L -23 50 Z"/>
    </g>
    
    <!-- A in Black - positioned right of K -->
    <g fill="#000000">
      <!-- A left diagonal -->
      <path d="M 45 70 L 75 -70 L 95 -70 L 125 70 Z" fill="none" stroke="#000000" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- A horizontal bar -->
      <rect x="55" y="5" width="55" height="20" rx="8" fill="#000000"/>
    </g>
  </g>
</svg>
